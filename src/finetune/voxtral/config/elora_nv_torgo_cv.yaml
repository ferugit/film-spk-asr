# Encoder-Only LoRA Fine-tuning Configuration for Voxtral
# Uses LoRA adapters on audio encoder, connector, and linear layers only
# Balances parameter efficiency with more trainable capacity than attention-only

# Training strategy: "full", "encoder_only", or "lora"
training_strategy: "lora"

# Reproducibility
seed: 2026  # Random seed for reproducibility

model_checkpoint: "mistralai/Voxtral-Mini-3B-2507"
output_dir: "./models/voxtral-encoder-lora-finetuned-neurovoz-torgo-cv"
dataset_path: "data/combined_neurovoz_torgo_cv"
cache_dir: "./models"

# Weighted sampling to oversample Spanish samples
use_weighted_sampler: false  # or false (default)
#spanish_weight: 3.0  # Weight for Spanish samples: 1.0 = no weighting, >1.0 increases Spanish sample frequency

# LoRA hyperparameters (only used when training_strategy="lora")
lora_r: 8  # Rank of LoRA matrices (higher = more parameters, default: 8)
lora_alpha: 16  # LoRA scaling factor (typically 2*r, default: 16)
lora_dropout: 0.1  # Dropout for LoRA layers (default: 0.1)
lora_target_modules: [
  "audio_tower.layers.*.self_attn.q_proj",
  "audio_tower.layers.*.self_attn.k_proj",
  "audio_tower.layers.*.self_attn.v_proj",
  "audio_tower.layers.*.self_attn.out_proj",
  "audio_tower.layers.*.fc1",
  "audio_tower.layers.*.fc2",
  "multi_modal_projector.linear_1",
  "multi_modal_projector.linear_2"
]  # Audio encoder attention + linear layers + connector

# Batch sizes - with max_audio_duration filtering, batch size 4 is safe on 40GB GPUs
per_device_train_batch_size: 8
per_device_eval_batch_size: 8
gradient_accumulation_steps: 2  # Effective batch = 16 (8 * 2)

# Learning rate - can use higher LR for LoRA
learning_rate: 3e-4  # Higher than encoder-only (LoRA adapts quickly)

# Training duration
num_train_epochs: 10  # More epochs since training is very fast

# Precision and optimization
bf16: true
optim: "adamw_torch_fused"
weight_decay: 0.01
max_grad_norm: 1.0
gradient_checkpointing: true

# Logging and evaluation
logging_steps: 50
eval_steps: 200
save_steps: 200
eval_strategy: "steps"
save_strategy: "steps"

# Model selection and early stopping
load_best_model_at_end: true
metric_for_best_model: "eval_loss"
greater_is_better: false
save_total_limit: 3
early_stopping_patience: 5

# Learning rate schedule
warmup_steps: 100
lr_scheduler_type: "cosine"

# System
report_to: "tensorboard"
remove_unused_columns: false
dataloader_num_workers: 2
