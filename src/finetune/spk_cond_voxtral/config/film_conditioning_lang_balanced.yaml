# Speaker-Conditioned Voxtral Fine-Tuning Config
# ================================================
#
# FiLM conditioning of Voxtral encoder using SiAMResNet34 x-vectors.
# Pathological speech (DYSARTHRIC/PARKINSON) is conditioned;
# normative speech (HC/Unknown) receives identity modulation.
#
# Dataset: combined_neurovoz_torgo_cv (NeuroVoz + TORGO + CommonVoice ES)

seed: 2026

# --- Model ---
model_checkpoint: "mistralai/Voxtral-Mini-3B-2507"
output_dir: "./models/voxtral-spk-cond-neurovoz-torgo-cv"
dataset_path: "data/combined_neurovoz_torgo_cv"
cache_dir: "./models"

# --- SiAMResNet34 (x-vector extractor) ---
xvector_model_path: "models/SiAMResNet34/samresnet34_w_features.jit"
train_xvector: true           # Fine-tune SiAMResNet34 jointly
xvector_lr_scale: 0.1         # LR for x-vector = base_lr * 0.1

# --- FiLM configuration ---
film_hidden_dim: 512           # Hidden dimension in FiLM MLP
film_mode: "per_layer"         # "per_layer" = independent FiLM per encoder layer
                               # "shared"    = one FiLM + layer embeddings
film_use_gate: true            # Learnable gate α ∈ [0,1] per layer

# --- What to train ---
# Voxtral components
train_encoder: false           # Keep Voxtral audio encoder frozen
train_projector: true          # Train the multi-modal projector

# --- Weighted sampling ---
use_weighted_sampler: false
#spanish_weight: 3.0            # Over-sample Spanish (NeuroVoz + CommonVoice)
# this data is balanced enough that we don't need to oversample Spanish

# --- Training hyperparameters ---
per_device_train_batch_size: 2
per_device_eval_batch_size: 2
gradient_accumulation_steps: 8   # Effective batch size = 16

learning_rate: 2e-4              # Higher LR for FiLM (few params, needs to learn fast)

num_train_epochs: 10

bf16: true
optim: "adamw_torch_fused"
weight_decay: 0.01
max_grad_norm: 1.0
gradient_checkpointing: true

logging_steps: 50
eval_steps: 200
save_steps: 200
eval_strategy: "steps"
save_strategy: "steps"

load_best_model_at_end: true
metric_for_best_model: "eval_loss"
greater_is_better: false
save_total_limit: 2

report_to: "tensorboard"
remove_unused_columns: false
dataloader_num_workers: 4
warmup_steps: 200
lr_scheduler_type: "cosine"
early_stopping_patience: 5
generation_max_length: 512
dataloader_pin_memory: true
